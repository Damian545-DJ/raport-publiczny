name: Apply representative 3 timeline on main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[timeline-done]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load prepared migration
        run: |
          git fetch origin agent/add-representative-3-timeline
          git show origin/agent/add-representative-3-timeline:.github/workflows/apply-representative-3-timeline.yml > /tmp/prepared-migration.yml
          sed -n "/python - <<'PY'/,/^          PY$/p" /tmp/prepared-migration.yml | sed '1d;$d;s/^          //' > /tmp/apply_timeline.py
          python /tmp/apply_timeline.py

      - name: Run complete site audit
        run: |
          python scripts/check_links.py
          python scripts/check_html_structure.py
          python scripts/check_html_accessibility.py
          python scripts/check_complete_site.py
          python scripts/check_language_parity.py

      - name: Commit timeline updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TIMELINE.pl.md TIMELINE.en.md TIMELINE.nl.md
          git commit -m "[timeline-done] Add representative 3 timeline in PL EN NL"
          git push origin HEAD:main
