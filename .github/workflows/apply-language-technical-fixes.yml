name: Apply language and technical fixes

on:
  push:
    paths:
      - '.github/workflows/apply-language-technical-fixes.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image dependency
        run: python -m pip install --disable-pip-version-check pillow

      - name: Apply fixes
        run: python scripts/apply_language_technical_fixes.py

      - name: Preserve abbreviated-name headings
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              "TIMELINE.en.md": (
                  "\nRepresentative 3 – mr. G.\n",
                  "\n### Representative 3 – mr. G.\n",
              ),
              "TIMELINE.nl.md": (
                  "\nGemachtigde 3 – mr. G.\n",
                  "\n### Gemachtigde 3 – mr. G.\n",
              ),
          }

          for filename, (old, new) in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              if old in text:
                  path.write_text(text.replace(old, new), encoding="utf-8")
                  print(f"restored heading: {filename}")
          PY

      - name: Commit generated corrections
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply language and technical corrections"
          git push origin HEAD:main
