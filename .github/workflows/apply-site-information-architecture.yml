name: Apply site information architecture

on:
  push:
    paths:
      - '.github/workflows/apply-site-information-architecture.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  redesign:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply redesign
        run: python scripts/apply_site_information_architecture.py
      - name: Commit generated redesign
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Simplify multilingual site navigation and home pages"
          git push origin HEAD:main
