name: Inspect GitHub Pages deployment once

on:
  push:
    paths:
      - '.github/workflows/configure-pages-source-once.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: read
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Read deployment state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          repo = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GH_TOKEN']
          headers = [
              '-H', f'Authorization: Bearer {token}',
              '-H', 'Accept: application/vnd.github+json',
              '-H', 'X-GitHub-Api-Version: 2022-11-28',
          ]

          def get_json(url):
              raw = subprocess.check_output(['curl', '-sS', *headers, url], text=True)
              return json.loads(raw)

          pages = get_json(f'https://api.github.com/repos/{repo}/pages')
          runs = get_json(f'https://api.github.com/repos/{repo}/actions/workflows/deploy-pages.yml/runs?per_page=10')
          deployments = get_json(f'https://api.github.com/repos/{repo}/deployments?environment=github-pages&per_page=10')

          lines = [
              '# GitHub Pages deployment diagnostic',
              '',
              '## Pages configuration',
              '```json',
              json.dumps(pages, indent=2),
              '```',
              '',
              '## Recent deploy workflow runs',
          ]

          for run in runs.get('workflow_runs', []):
              lines += [
                  '',
                  f"- id: {run.get('id')}",
                  f"  status: {run.get('status')}",
                  f"  conclusion: {run.get('conclusion')}",
                  f"  event: {run.get('event')}",
                  f"  head_sha: {run.get('head_sha')}",
                  f"  created_at: {run.get('created_at')}",
                  f"  updated_at: {run.get('updated_at')}",
                  f"  html_url: {run.get('html_url')}",
              ]

          lines += ['', '## Recent github-pages deployments']
          for dep in deployments:
              lines += [
                  '',
                  f"- id: {dep.get('id')}",
                  f"  sha: {dep.get('sha')}",
                  f"  ref: {dep.get('ref')}",
                  f"  created_at: {dep.get('created_at')}",
                  f"  updated_at: {dep.get('updated_at')}",
              ]

          with open('PAGES_DEPLOYMENT_STATUS.md', 'w', encoding='utf-8') as f:
              f.write('\n'.join(lines) + '\n')
          PY
      - name: Commit diagnostic result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PAGES_DEPLOYMENT_STATUS.md
          git commit -m "Record GitHub Pages deployment status" || exit 0
          git push origin HEAD:main
