name: Configure GitHub Pages source once

on:
  push:
    paths:
      - '.github/workflows/configure-pages-source-once.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Configure Pages to publish gh-pages root
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          HEADERS=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")

          BEFORE=$(curl -sS "${HEADERS[@]}" "$API")
          PUT_BODY='{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}'
          PUT_RESULT=$(curl -sS -w '\nHTTP_STATUS:%{http_code}\n' -X PUT "${HEADERS[@]}" -H "Content-Type: application/json" "$API" -d "$PUT_BODY")
          AFTER=$(curl -sS "${HEADERS[@]}" "$API")

          {
            echo "# GitHub Pages source diagnostic"
            echo
            echo "## Before"
            echo '```json'
            echo "$BEFORE"
            echo '```'
            echo
            echo "## Update result"
            echo '```text'
            echo "$PUT_RESULT"
            echo '```'
            echo
            echo "## After"
            echo '```json'
            echo "$AFTER"
            echo '```'
          } > PAGES_SOURCE_STATUS.md

      - name: Commit diagnostic result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PAGES_SOURCE_STATUS.md
          git commit -m "Record GitHub Pages source configuration" || exit 0
          git push origin HEAD:main
