name: Configure GitHub Pages source once

on:
  push:
    paths:
      - '.github/workflows/configure-pages-source-once.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: read
  actions: read

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Inspect Pages and deployment runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          HEADERS=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")
          PAGES=$(curl -sS "${HEADERS[@]}" "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")
          RUNS=$(curl -sS "${HEADERS[@]}" "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-pages.yml/runs?per_page=10")
          DEPLOYMENTS=$(curl -sS "${HEADERS[@]}" "https://api.github.com/repos/${GITHUB_REPOSITORY}/deployments?environment=github-pages&per_page=10")

          python - <<'PY'
          import json, os

          pages = json.loads(os.environ.get('PAGES_JSON', '{}'))
          runs = json.loads(os.environ.get('RUNS_JSON', '{}'))
          deployments = json.loads(os.environ.get('DEPLOYMENTS_JSON', '[]'))

          out = ['# GitHub Pages deployment diagnostic', '', '## Pages configuration', '```json', json.dumps(pages, indent=2), '```', '', '## Recent deploy workflow runs']
          for run in runs.get('workflow_runs', []):
              out.extend([
                  '',
                  f"- id: {run.get('id')}",
                  f"  status: {run.get('status')}",
                  f"  conclusion: {run.get('conclusion')}",
                  f"  event: {run.get('event')}",
                  f"  head_sha: {run.get('head_sha')}",
                  f"  created_at: {run.get('created_at')}",
                  f"  updated_at: {run.get('updated_at')}",
                  f"  html_url: {run.get('html_url')}",
              ])
          out.extend(['', '## Recent github-pages deployments'])
          for dep in deployments:
              out.extend([
                  '',
                  f"- id: {dep.get('id')}",
                  f"  sha: {dep.get('sha')}",
                  f"  ref: {dep.get('ref')}",
                  f"  created_at: {dep.get('created_at')}",
                  f"  updated_at: {dep.get('updated_at')}",
              ])
          open('PAGES_DEPLOYMENT_STATUS.md', 'w', encoding='utf-8').write('\n'.join(out) + '\n')
          PY
        env:
          GH_TOKEN: ${{ github.token }}
          PAGES_JSON: ${{ steps.none.outputs.pages }}

      - name: Build diagnostic file
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json, os, subprocess

          headers = [
              '-H', f"Authorization: Bearer {os.environ['GH_TOKEN']}",
              '-H', 'Accept: application/vnd.github+json',
              '-H', 'X-GitHub-Api-Version: 2022-11-28',
          ]
          repo = os.environ['GITHUB_REPOSITORY']
          def get(url):
              raw = subprocess.check_output(['curl', '-sS', *headers, url], text=True)
              return json.loads(raw)
          pages = get(f'https://api.github.com/repos/{repo}/pages')
          runs = get(f'https://api.github.com/repos/{repo}/actions/workflows/deploy-pages.yml/runs?per_page=10')
          deployments = get(f'https://api.github.com/repos/{repo}/deployments?environment=github-pages&per_page=10')

          out = ['# GitHub Pages deployment diagnostic', '', '## Pages configuration', '```json', json.dumps(pages, indent=2), '```', '', '## Recent deploy workflow runs']
          for run in runs.get('workflow_runs', []):
              out.extend(['', f"- id: {run.get('id')}", f"  status: {run.get('status')}", f"  conclusion: {run.get('conclusion')}", f"  event: {run.get('event')}", f"  head_sha: {run.get('head_sha')}", f"  created_at: {run.get('created_at')}", f"  updated_at: {run.get('updated_at')}", f"  html_url: {run.get('html_url')}"])
          out.extend(['', '## Recent github-pages deployments'])
          for dep in deployments:
              out.extend(['', f"- id: {dep.get('id')}", f"  sha: {dep.get('sha')}", f"  ref: {dep.get('ref')}", f"  created_at: {dep.get('created_at')}", f"  updated_at: {dep.get('updated_at')}"])
          open('PAGES_DEPLOYMENT_STATUS.md', 'w', encoding='utf-8').write('\n'.join(out) + '\n')
          PY

      - name: Commit diagnostic result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PAGES_DEPLOYMENT_STATUS.md
          git commit -m "Record GitHub Pages deployment status" || exit 0
          git push origin HEAD:main
