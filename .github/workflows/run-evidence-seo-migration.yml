name: Run evidence and SEO migration

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/evidence-seo-fix
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Allow stable doc viewer canonical in link audit
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/check_links.py')
          text = path.read_text(encoding='utf-8')
          old = '''                if not target:
                    self.errors.append(LinkError(ref.source_file, ref.line_no, ref.raw_url, "missing ?file= parameter"))
                    continue'''
          new = '''                if not target:
                    if rel_path not in self.existing_rel:
                        self.errors.append(LinkError(ref.source_file, ref.line_no, ref.raw_url, "missing doc.html"))
                    continue'''
          if old not in text:
              raise SystemExit('Expected missing-parameter block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Remove temporary migration diagnostics
        run: |
          rm -f .evidence-seo-trigger .pr-trigger-note evidence-seo-audit.txt scripts/apply_evidence_seo_fix.py

      - name: Run repository audits
        run: |
          python scripts/check_links.py
          python scripts/check_html_structure.py
          python scripts/check_complete_site.py
          python scripts/check_language_parity.py

      - name: Commit final migration result to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Finalize verifiable evidence and multilingual SEO"
          git push origin HEAD:agent/evidence-seo-fix
