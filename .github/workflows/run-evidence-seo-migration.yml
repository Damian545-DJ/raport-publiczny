name: Run evidence and SEO migration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/evidence-seo-fix
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Repair migration script typo
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_evidence_seo_fix.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'doc = doc_path.read_text(encoding="utf-8")ndoc_marker =',
              'doc = doc_path.read_text(encoding="utf-8")\nndoc_marker =',
          )
          path.write_text(text, encoding='utf-8')
          PY

      - name: Apply evidence and SEO changes
        run: python scripts/apply_evidence_seo_fix.py

      - name: Run repository audits
        run: |
          python scripts/check_links.py
          python scripts/check_html_structure.py
          python scripts/check_complete_site.py
          python scripts/check_language_parity.py

      - name: Commit migration result to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Add verifiable evidence excerpts and fix multilingual SEO"
          git push origin HEAD:agent/evidence-seo-fix
