name: Finalize full report viewer once

on:
  push:
    paths:
      - '.github/workflows/finalize-report-viewer-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Prevent CDN from blocking the local viewer
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('doc.html')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>',
              '<script async src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>'
          )
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit correction
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add doc.html
          git commit -m "Prevent external CDN from blocking report viewer"
          git push origin HEAD:main
