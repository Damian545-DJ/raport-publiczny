name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout current main
        uses: actions/checkout@v4

      - name: Validate required public files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          required = (
              "index.html",
              "doc.html",
              "assets/markdown-fallback.js",
              "pl/index.html",
              "en/index.html",
              "nl/index.html",
              "PUBLICZNY_RAPORT_DOWODOWY_ANON_PL.md",
              "PUBLIC_REPORT_EVIDENCE_ANON_EN.md",
              "PUBLIEK_BEWIJS_RAPPORT_ANON_NL.md",
          )

          missing = [name for name in required if not Path(name).is_file()]
          if missing:
              raise SystemExit("Missing required public files:\n- " + "\n- ".join(missing))

          print("Required public files are present.")
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload current main as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy current main to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
