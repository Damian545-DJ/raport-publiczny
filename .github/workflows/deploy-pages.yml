name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[pages-marker]')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record successful deployment
        run: |
          printf 'deployed_commit=%s\ndeployed_at=%s\npage_url=%s\n' \
            "$GITHUB_SHA" \
            "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            "${{ steps.deployment.outputs.page_url }}" \
            > .pages-deployment-status
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .pages-deployment-status
          git commit -m "[pages-marker] Record successful GitHub Pages deployment"
          git push origin HEAD:main
