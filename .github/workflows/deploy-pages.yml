name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout current main
        uses: actions/checkout@v4

      - name: Validate visible date metadata
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          required = {
              "index.html": (
                  "Ostatnia zmiana:",
                  "Weryfikacja źródeł:",
              ),
              "pl/index.html": (
                  "Ostatnia zmiana:",
                  "Ostatnia weryfikacja źródeł:",
              ),
              "en/index.html": (
                  "Last modified:",
                  "Sources last verified:",
              ),
              "nl/index.html": (
                  "Laatst gewijzigd:",
                  "Bronnen laatst geverifieerd:",
              ),
              "pl/home-of-people.html": (
                  "Ostatnia zmiana:",
                  "Ostatnia weryfikacja źródeł:",
              ),
              "en/home-of-people.html": (
                  "Last modified:",
                  "Sources last verified:",
              ),
              "nl/home-of-people.html": (
                  "Laatst gewijzigd:",
                  "Bronnen laatst geverifieerd:",
              ),
              "pl/najwazniejsze-ustalenia.html": (
                  "Ostatnia zmiana:",
                  "Ostatnia weryfikacja źródeł:",
              ),
              "en/key-findings.html": (
                  "Last modified:",
                  "Sources last verified:",
              ),
              "nl/belangrijkste-bevindingen.html": (
                  "Laatst gewijzigd:",
                  "Bronnen laatst geverifieerd:",
              ),
          }

          obsolete_labels = (
              "Ostatnia aktualizacja:",
              "Last updated:",
              "Last update:",
              "Laatst bijgewerkt:",
              "Laatste update:",
          )
          date_re = re.compile(r"\b\d{4}-\d{2}-\d{2}\b")
          errors = []

          for filename, labels in required.items():
              path = Path(filename)
              if not path.exists():
                  errors.append(f"missing file: {filename}")
                  continue

              text = path.read_text(encoding="utf-8")
              for label in labels:
                  if label not in text:
                      errors.append(f"{filename}: missing label {label!r}")

              for obsolete in obsolete_labels:
                  if obsolete in text:
                      errors.append(f"{filename}: obsolete label remains: {obsolete!r}")

              visible_dates = date_re.findall(text)
              if len(visible_dates) < 2:
                  errors.append(f"{filename}: fewer than two visible ISO dates")

          updates = Path("UPDATES.md").read_text(encoding="utf-8")
          for phrase in (
              "rozdzielenie dat zmian i weryfikacji źródeł",
              "Ostatnia zmiana",
              "Ostatnia weryfikacja źródeł",
              "Last modified",
              "Sources last verified",
              "Laatst gewijzigd",
              "Bronnen laatst geverifieerd",
          ):
              if phrase not in updates:
                  errors.append(f"UPDATES.md: missing {phrase!r}")

          if errors:
              raise SystemExit("Date metadata validation failed:\n- " + "\n- ".join(errors))

          print("Date metadata validation passed for PL, EN and NL.")
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload current main as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy current main to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
