name: Update full report once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-full-report-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update reports and home pages
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/update-full-report-once.yml')

          def replace_once(path_str: str, old: str, new: str) -> None:
              path = Path(path_str)
              text = path.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Marker not found in {path_str}: {old[:100]!r}')
              if text.count(old) != 1:
                  raise SystemExit(f'Marker occurs {text.count(old)} times in {path_str}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          # ---------- FULL REPORTS ----------
          replace_once(
              'PUBLICZNY_RAPORT_DOWODOWY_ANON_PL.md',
              '**Charakter:** dokument informacyjny i dowodowy, nie wyrok ani porada prawna.\n\n---',
              '**Charakter:** dokument informacyjny i dowodowy, nie wyrok ani porada prawna.  \n**Wersja raportu:** 2.0  \n**Data aktualizacji:** 2026-07-14  \n**Status publikacji:** publiczna, zanonimizowana wersja pełnego raportu.\n\n---'
          )

          pl_insert = '''- problemy z kolejnymi pełnomocnikami i reakcją instytucji.

---

## 1A. Aktualne kwoty kolejnych wyliczeń

