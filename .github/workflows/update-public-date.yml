name: Update public date

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-date:
    if: ${{ !contains(github.event.head_commit.message, '[date-done]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update visible last-updated labels
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          new_date = "2026-07-11"
          labels = (
              "Ostatnia aktualizacja",
              "Last updated",
              "Laatst bijgewerkt",
          )

          changed = []
          for path in list(Path('.').rglob('*.html')) + list(Path('.').rglob('*.md')):
              if '.git' in path.parts:
                  continue
              text = path.read_text(encoding='utf-8')
              original = text
              for label in labels:
                  text = re.sub(
                      rf'({re.escape(label)}(?:</strong>)?\s*:?\s*)(\d{{4}}-\d{{2}}-\d{{2}})',
                      rf'\g<1>{new_date}',
                      text,
                  )
              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(str(path))

          nl_index = Path('nl/index.html')
          text = nl_index.read_text(encoding='utf-8')
          marker = '<p class="meta">De HTML-versie is een leesbare samenvatting; Markdown blijft de volledige bronlaag.</p>'
          date_line = f'<p class="meta"><strong>Laatst bijgewerkt:</strong> {new_date}</p>'
          if date_line not in text:
              if marker not in text:
                  raise SystemExit('NL index insertion marker not found')
              text = text.replace(marker, marker + '\n      ' + date_line, 1)
              nl_index.write_text(text, encoding='utf-8')
              changed.append(str(nl_index))

          updates = Path('UPDATES.md')
          text = updates.read_text(encoding='utf-8')
          heading = f'## {new_date}'
          if heading not in text:
              block = (
                  f'# Updates\n\n{heading}\n\n'
                  'PL\n- Zaktualizowano widoczne daty aktualizacji publicznej strony po dodaniu osi czasu Pełnomocnika 3 w wersjach PL/EN/NL.\n\n'
                  'EN\n- Updated the visible public-site dates after adding the Representative 3 timeline in PL/EN/NL.\n\n'
                  'NL\n- De zichtbare updatedatums van de publieke website zijn bijgewerkt na toevoeging van de tijdlijn van Gemachtigde 3 in PL/EN/NL.\n\n---\n'
              )
              if not text.startswith('# Updates\n'):
                  raise SystemExit('UPDATES.md header not found')
              text = text.replace('# Updates\n', block, 1)
              updates.write_text(text, encoding='utf-8')
              changed.append(str(updates))

          if not changed:
              raise SystemExit('No date changes were made')
          print('Updated files:')
          print('\n'.join(sorted(set(changed))))
          PY

      - name: Run complete site audit
        run: |
          python scripts/check_links.py
          python scripts/check_html_structure.py
          python scripts/check_html_accessibility.py
          python scripts/check_complete_site.py
          python scripts/check_language_parity.py

      - name: Commit date update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.md' '*.html' pl en nl home-of-people
          git commit -m "[date-done] Update public last-updated date to 2026-07-11"
          git push origin HEAD:main
