name: Finalize language parity counts

on:
  push:
    branches:
      - codex/fix-process-verbaal-language-parity
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/fix-process-verbaal-language-parity
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Finalize exact line counts
        run: python scripts/finalize_language_counts.py

      - name: Remove one-time files
        run: |
          rm -f scripts/finalize_language_counts.py
          rm -f scripts/final_audit_output.txt
          rm -f .github/workflows/finalize-language-counts.yml

      - name: Run all audits
        run: |
          python scripts/check_links.py
          python scripts/check_html_structure.py
          python scripts/check_complete_site.py
          python scripts/check_language_parity.py

      - name: Commit final verified state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize verified language parity"
          git push origin HEAD:codex/fix-process-verbaal-language-parity
