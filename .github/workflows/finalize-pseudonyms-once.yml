name: Finalize pseudonyms once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/finalize-pseudonyms-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize inflected pseudonyms and evidence IDs
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          workflow = Path('.github/workflows/finalize-pseudonyms-once.yml')
          allowed = {'.md', '.html', '.htm', '.txt', '.py', '.json', '.yml', '.yaml'}

          def normalize(text: str) -> str:
              # Polish female primary person: every B/2 form becomes number 1.
              text = re.sub(r'\bPracownica (?:B|2)\b', 'Pracownica 1', text)
              text = re.sub(r'\bPracownicy (?:B|2)\b', 'Pracownicy 1', text)
              text = re.sub(r'\bPracownicę (?:B|2)\b', 'Pracownicę 1', text)
              text = re.sub(r'\bPracownicą (?:B|2)\b', 'Pracownicą 1', text)
              text = re.sub(r'\bPracownico (?:B|2)\b', 'Pracownico 1', text)
              # Polish male second person: every A/1 form becomes number 2.
              text = re.sub(r'\bPracownik (?:A|1)\b', 'Pracownik 2', text)
              text = re.sub(r'\bPracownika (?:A|1)\b', 'Pracownika 2', text)
              text = re.sub(r'\bPracownikowi (?:A|1)\b', 'Pracownikowi 2', text)
              text = re.sub(r'\bPracownikiem (?:A|1)\b', 'Pracownikiem 2', text)
              text = re.sub(r'\bPracowniku (?:A|1)\b', 'Pracowniku 2', text)
              # Underscore variants used in anonymized filenames.
              text = text.replace('Pracownica_B', 'Pracownica_1').replace('Pracownica_2', 'Pracownica_1')
              text = text.replace('Pracownik_A', 'Pracownik_2').replace('Pracownik_1', 'Pracownik_2')

              # English.
              text = text.replace('Worker B', 'Worker 1').replace('Worker A', 'Worker 2')
              text = text.replace('Worker_B', 'Worker_1').replace('Worker_A', 'Worker_2')

              # Dutch.
              text = text.replace('Werkneemster B', 'Werkneemster 1').replace('Werkneemster 2', 'Werkneemster 1')
              text = text.replace('Werknemer B', 'Werkneemster 1').replace('Werknemer 1', 'Werkneemster 1')
              text = text.replace('Werknemer A', 'Werknemer 2')
              text = text.replace('Werkneemster_B', 'Werkneemster_1').replace('Werkneemster_2', 'Werkneemster_1')
              text = text.replace('Werknemer_B', 'Werkneemster_1').replace('Werknemer_1', 'Werkneemster_1')
              text = text.replace('Werknemer_A', 'Werknemer_2')

              # Evidence IDs: person 1 and person 2 instead of B and A.
              text = text.replace('E-PB-', 'E-P1-').replace('E-PA-', 'E-P2-')
              text = text.replace('E-WB-', 'E-W1-').replace('E-WA-', 'E-W2-')
              return text

          changed = []
          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts or path == workflow or path.suffix.lower() not in allowed:
                  continue
              try:
                  original = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              updated = normalize(original)
              if updated != original:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(str(path))

          glossaries = {
              Path('ANONYMIZATION.pl.md'): (
                  '## Stałe pseudonimy osób',
                  '## Stałe pseudonimy osób\n\n- **Pracownica 1** — główna pracownica, której dotyczy sprawa o wynagrodzenie i umowę Fase 4.\n- **Pracownik 2** — drugi pracownik występujący w dokumentacji publicznej.\n\nNazwy „Pracownica B”, „Pracownik A”, „Pracownik 1” i „Pracownica 2” nie są używane w aktualnej wersji raportu.\n'
              ),
              Path('ANONYMIZATION.en.md'): (
                  '## Fixed person pseudonyms',
                  '## Fixed person pseudonyms\n\n- **Worker 1** — the primary worker in the wage and Fase 4 case.\n- **Worker 2** — the second worker appearing in the public documentation.\n\nThe labels “Worker A” and “Worker B” are not used in the current report.\n'
              ),
              Path('ANONYMIZATION.nl.md'): (
                  '## Vaste pseudoniemen van personen',
                  '## Vaste pseudoniemen van personen\n\n- **Werkneemster 1** — de hoofdwerkneemster in de loon- en Fase 4-zaak.\n- **Werknemer 2** — de tweede werknemer die in de publieke documentatie voorkomt.\n\nDe aanduidingen “Werknemer A”, “Werknemer B”, “Werknemer 1” en “Werkneemster 2” worden in het actuele rapport niet gebruikt.\n'
              ),
          }

          for path, (marker, block) in glossaries.items():
              if not path.exists():
                  continue
              text = path.read_text(encoding='utf-8')
              text = normalize(text)
              if marker not in text:
                  lines = text.splitlines()
                  insert_at = 0
                  for i, line in enumerate(lines):
                      if line.startswith('# '):
                          insert_at = i + 1
                          break
                  lines[insert_at:insert_at] = ['', block.rstrip(), '']
                  text = '\n'.join(lines) + ('\n' if text.endswith('\n') else '')
                  path.write_text(text, encoding='utf-8')
                  changed.append(str(path))

          forbidden_patterns = [
              r'\bPracownica B\b', r'\bPracownicy B\b', r'\bPracownicę B\b', r'\bPracownicą B\b',
              r'\bPracownica 2\b', r'\bPracownicy 2\b', r'\bPracownik A\b', r'\bPracownika A\b',
              r'\bPracownik 1\b', r'\bPracownika 1\b', r'Worker B', r'Worker A',
              r'Werkneemster B', r'Werkneemster 2', r'Werknemer B', r'Werknemer A', r'Werknemer 1',
              r'E-PB-', r'E-PA-', r'E-WB-', r'E-WA-'
          ]
          failures = []
          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts or path == workflow or path.suffix.lower() not in allowed:
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              for pattern in forbidden_patterns:
                  if re.search(pattern, text):
                      failures.append(f'{path}: {pattern}')
          if failures:
              raise SystemExit('Old pseudonyms or IDs remain:\n' + '\n'.join(failures))

          print('Changed files:')
          for item in sorted(set(changed)):
              print(item)
          PY

      - name: Remove one-time workflow and commit
        run: |
          rm -f .github/workflows/finalize-pseudonyms-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes required"
            exit 0
          fi
          git commit -m "Dokończenie ujednolicenia pseudonimów i indeksów"
          git push
