name: Build static full reports once

on:
  push:
    paths:
      - '.github/workflows/build-static-full-reports-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Markdown renderer
        run: python -m pip install --disable-pip-version-check markdown
      - name: Generate static report pages and update links
        run: python scripts/build_static_full_reports.py
      - name: Commit generated pages
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pl/full-report.html en/full-report.html nl/full-report.html pl/index.html en/index.html nl/index.html
          git commit -m "Publish static full reports in PL EN and NL"
          git push origin HEAD:main
