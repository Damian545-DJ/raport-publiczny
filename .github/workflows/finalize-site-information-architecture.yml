name: Finalize site information architecture

on:
  push:
    paths:
      - '.github/workflows/finalize-site-information-architecture.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/finalize_site_information_architecture.py
      - name: Align media contact wording
        run: |
          python - <<'PY'
          from pathlib import Path
          replacements = {
              'pl/media.html': ('W sprawach medialnych i instytucjonalnych należy używać wskazanego kontaktu LinkedIn albo innego zweryfikowanego kanału podanego przez autora raportu.', 'W sprawach medialnych i instytucjonalnych należy używać formularza kontaktowego, LinkedIn albo innego zweryfikowanego kanału podanego przez autora raportu.'),
              'en/media.html': ('For media and institutional contact, use the LinkedIn contact path listed above or another verified channel provided by the report author.', 'For media and institutional contact, use the contact form, the LinkedIn path listed above, or another verified channel provided by the report author.'),
              'nl/media.html': ('Gebruik voor media- of institutioneel contact het hierboven vermelde LinkedIn-kanaal of een ander geverifieerd kanaal van de auteur van het rapport.', 'Gebruik voor media- of institutioneel contact het contactformulier, het hierboven vermelde LinkedIn-kanaal of een ander geverifieerd kanaal van de auteur van het rapport.'),
          }
          for filename, (old, new) in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              if old in text:
                  path.write_text(text.replace(old, new), encoding='utf-8')
                  print(f'updated: {filename}')
          PY
      - name: Commit final corrections
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize multilingual navigation and contact localization"
          git push origin HEAD:main
