name: Finalize site information architecture

on:
  push:
    paths:
      - '.github/workflows/finalize-site-information-architecture.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/finalize_site_information_architecture.py
      - name: Commit final corrections
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize multilingual navigation and contact localization"
          git push origin HEAD:main
