name: Site audit

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  link-and-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Check internal links and file references
        run: python scripts/check_links.py
