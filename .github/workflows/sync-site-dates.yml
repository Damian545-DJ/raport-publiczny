name: Synchronize site dates

# Default dates for the first normalization run: modification 2026-07-14,
# substantive source verification 2026-07-11.
on:
  push:
    branches:
      - main
    paths:
      - scripts/update_site_dates.py
      - .github/workflows/sync-site-dates.yml
  workflow_dispatch:
    inputs:
      last_modified:
        description: Visible last-modified date (YYYY-MM-DD)
        required: true
        default: '2026-07-14'
      sources_verified:
        description: Visible source-verification date (YYYY-MM-DD)
        required: true
        default: '2026-07-11'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  synchronize-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout current main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Normalize PL EN NL dates
        env:
          LAST_MODIFIED: ${{ github.event.inputs.last_modified || '2026-07-14' }}
          SOURCES_VERIFIED: ${{ github.event.inputs.sources_verified || '2026-07-11' }}
        run: python scripts/update_site_dates.py

      - name: Commit synchronized metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          if git diff --cached --quiet; then
            echo "No metadata changes were required."
          else
            git commit -m "Ujednolicenie dat zmian i weryfikacji źródeł"
            git push origin HEAD:main
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload synchronized site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy synchronized site
        id: deployment
        uses: actions/deploy-pages@v4
