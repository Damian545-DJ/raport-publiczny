name: Final timeline cleanup

on:
  push:
    branches:
      - agent/fix-public-sources-and-privacy
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: agent/fix-public-sources-and-privacy
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Switch to clean result branch
        run: git checkout -B agent/public-source-privacy-clean origin/agent/public-source-privacy-clean

      - name: Correct EN and NL chronology
        run: |
          python - <<'PY'
          from pathlib import Path

          en = Path('TIMELINE.en.md')
          text = en.read_text(encoding='utf-8')
          old = '- **20.01.2026:** information was provided that the preliminary procedure had ended after contact with the employer; internal case references were removed.'
          new = '- **03 Dec 2025:** SNCU registered the report; the internal reference was removed from the public version.'
          if text.count(old) < 2:
              raise SystemExit('Expected two EN SNCU entries before correction')
          text = text.replace(old, new, 1)
          text = text.replace('\n  ( + screenshots)', '')
          en.write_text(text, encoding='utf-8')

          nl = Path('TIMELINE.nl.md')
          text = nl.read_text(encoding='utf-8')
          old = '- **20.01.2026:** meegedeeld werd dat het vooronderzoek na contact met de werkgever was beëindigd; interne zaakreferenties zijn verwijderd.'
          new = '- **03-12-2025:** SNCU registreerde de melding; het interne kenmerk is uit de publieke versie verwijderd.'
          if text.count(old) < 2:
              raise SystemExit('Expected two NL SNCU entries before correction')
          text = text.replace(old, new, 1)
          text = text.replace('\n  ( + screenshots)', '')
          nl.write_text(text, encoding='utf-8')
          PY

      - name: Verify and test
        run: |
          ! grep -R -F '( + screenshots)' TIMELINE.en.md TIMELINE.nl.md
          grep -F '**03 Dec 2025:** SNCU registered the report' TIMELINE.en.md
          grep -F '**03-12-2025:** SNCU registreerde de melding' TIMELINE.nl.md
          python scripts/check_links.py
          python scripts/check_html_structure.py
          python scripts/check_complete_site.py
          python scripts/check_language_parity.py

      - name: Commit final chronology corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TIMELINE.en.md TIMELINE.nl.md
          git commit -m "Correct SNCU chronology in EN and NL"
          git push origin HEAD:agent/public-source-privacy-clean
