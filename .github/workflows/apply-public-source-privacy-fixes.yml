name: Apply public source and privacy fixes

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-public-sources-and-privacy
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply source and privacy changes
        run: python scripts/apply_public_source_privacy_fixes.py

      - name: Remove obsolete article number from explanatory text
        run: |
          python - <<'PY'
          from pathlib import Path
          replacements = {
              'home-of-people/README.pl.md': (
                  'Błędny numer artykułu GroentenNieuws 9486553 został zastąpiony numerem 9487775.',
                  'Błędny numer artykułu GroentenNieuws został zastąpiony poprawnym numerem 9487775.',
              ),
              'home-of-people/README.en.md': (
                  'The incorrect GroentenNieuws article number 9486553 was replaced with 9487775.',
                  'The incorrect GroentenNieuws article number was replaced with the correct number 9487775.',
              ),
              'home-of-people/README.nl.md': (
                  'Het onjuiste GroentenNieuws-artikelnummer 9486553 is vervangen door 9487775.',
                  'Het onjuiste GroentenNieuws-artikelnummer is vervangen door het correcte nummer 9487775.',
              ),
          }
          for name, (old, new) in replacements.items():
              path = Path(name)
              value = path.read_text(encoding='utf-8').replace(old, new)
              path.write_text(value, encoding='utf-8')
          PY

      - name: Run and record repository audits
        run: |
          set +e
          : > scripts/public_fix_audit.txt
          status=0
          for cmd in \
            "python scripts/check_links.py" \
            "python scripts/check_html_structure.py" \
            "python scripts/check_complete_site.py" \
            "python scripts/check_language_parity.py"
          do
            echo "===== $cmd =====" >> scripts/public_fix_audit.txt
            bash -lc "$cmd" >> scripts/public_fix_audit.txt 2>&1
            code=$?
            echo "EXIT=$code" >> scripts/public_fix_audit.txt
            echo >> scripts/public_fix_audit.txt
            if [ "$code" -ne 0 ]; then status=1; fi
          done
          echo "FINAL_STATUS=$status" >> scripts/public_fix_audit.txt
          cat scripts/public_fix_audit.txt

      - name: Package changed files
        run: |
          rm -rf /tmp/public-fix-package
          mkdir -p /tmp/public-fix-package/changed
          {
            git diff --name-only --diff-filter=AMCR HEAD
            git ls-files --others --exclude-standard
          } | sort -u > /tmp/public-fix-package/changed.txt
          git diff --name-only --diff-filter=D HEAD > /tmp/public-fix-package/deleted.txt
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              scripts/apply_public_source_privacy_fixes.py|.github/workflows/apply-public-source-privacy-fixes.yml|scripts/public_fix_audit.txt|public-fix-package.tar.gz)
                continue
                ;;
            esac
            mkdir -p "/tmp/public-fix-package/changed/$(dirname "$file")"
            cp "$file" "/tmp/public-fix-package/changed/$file"
          done < /tmp/public-fix-package/changed.txt
          printf '%s\n' \
            'scripts/apply_public_source_privacy_fixes.py' \
            '.github/workflows/apply-public-source-privacy-fixes.yml' \
            >> /tmp/public-fix-package/deleted.txt
          sort -u /tmp/public-fix-package/deleted.txt -o /tmp/public-fix-package/deleted.txt
          cp scripts/public_fix_audit.txt /tmp/public-fix-package/audit.txt
          tar -C /tmp/public-fix-package -czf public-fix-package.tar.gz .

      - name: Upload generated changes
        uses: actions/upload-artifact@v4
        with:
          name: public-source-privacy-fixes-v2
          path: public-fix-package.tar.gz
          if-no-files-found: error
