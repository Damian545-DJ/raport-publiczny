name: Apply public source and privacy fixes

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-public-sources-and-privacy
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Prepare clean branch from main
        run: |
          cp scripts/apply_public_source_privacy_fixes.py /tmp/apply_public_source_privacy_fixes.py
          git checkout -B agent/public-source-privacy-clean origin/main
          cp /tmp/apply_public_source_privacy_fixes.py scripts/apply_public_source_privacy_fixes.py

      - name: Apply source and privacy changes
        run: python scripts/apply_public_source_privacy_fixes.py

      - name: Final privacy cleanup
        run: |
          python - <<'PY'
          from pathlib import Path
          replacements = {
              'home-of-people/README.pl.md': (
                  'Błędny numer artykułu GroentenNieuws 9486553 został zastąpiony numerem 9487775.',
                  'Błędny numer artykułu GroentenNieuws został zastąpiony poprawnym numerem 9487775.',
              ),
              'home-of-people/README.en.md': (
                  'The incorrect GroentenNieuws article number 9486553 was replaced with 9487775.',
                  'The incorrect GroentenNieuws article number was replaced with the correct number 9487775.',
              ),
              'home-of-people/README.nl.md': (
                  'Het onjuiste GroentenNieuws-artikelnummer 9486553 is vervangen door 9487775.',
                  'Het onjuiste GroentenNieuws-artikelnummer is vervangen door het correcte nummer 9487775.',
              ),
          }
          for name, (old, new) in replacements.items():
              path = Path(name)
              path.write_text(path.read_text(encoding='utf-8').replace(old, new), encoding='utf-8')
          PY
          rm -f scripts/apply_public_source_privacy_fixes.py
          git checkout HEAD -- .github/workflows/site-audit.yml

      - name: Run repository audits
        run: |
          python scripts/check_links.py
          python scripts/check_html_structure.py
          python scripts/check_complete_site.py
          python scripts/check_language_parity.py

      - name: Commit and publish clean branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix public sources and reduce privacy risk"
          git push --force-with-lease origin HEAD:agent/public-source-privacy-clean
