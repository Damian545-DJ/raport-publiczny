name: Verify static full reports once

on:
  push:
    paths:
      - '.github/workflows/verify-static-full-reports-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Check public report pages
        shell: bash
        run: |
          sleep 25
          : > STATIC_REPORT_STATUS.md
          echo '# Static full-report publication check' >> STATIC_REPORT_STATUS.md
          for lang in pl en nl; do
            url="https://damian545-dj.github.io/raport-publiczny/${lang}/full-report.html?check=${GITHUB_SHA}"
            body="/tmp/${lang}.html"
            code=$(curl -L -sS -o "$body" -w '%{http_code}' -H 'Cache-Control: no-cache' "$url" || true)
            title=$(python - "$body" <<'PY'
          import re,sys
          p=sys.argv[1]
          try:
              text=open(p,encoding='utf-8',errors='replace').read()
          except OSError:
              text=''
          m=re.search(r'<title>(.*?)</title>',text,re.I|re.S)
          print((m.group(1).strip() if m else 'NO TITLE').replace('\n',' '))
          PY
          )
            size=$(wc -c < "$body" 2>/dev/null || echo 0)
            {
              echo
              echo "## ${lang}"
              echo "- URL: ${url}"
              echo "- HTTP: ${code}"
              echo "- bytes: ${size}"
              echo "- title: ${title}"
            } >> STATIC_REPORT_STATUS.md
          done
      - name: Record result
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add STATIC_REPORT_STATUS.md
          git commit -m 'Record static full-report publication check' || exit 0
          git push origin HEAD:main
