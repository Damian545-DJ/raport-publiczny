name: Verify static full reports once

on:
  push:
    paths:
      - '.github/workflows/verify-static-full-reports-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Check public report pages and entry links
        shell: bash
        run: |
          sleep 25
          : > STATIC_REPORT_STATUS.md
          echo '# Static full-report publication check' >> STATIC_REPORT_STATUS.md
          for lang in pl en nl; do
            report_url="https://damian545-dj.github.io/raport-publiczny/${lang}/full-report.html?check=${GITHUB_SHA}"
            index_url="https://damian545-dj.github.io/raport-publiczny/${lang}/index.html?check=${GITHUB_SHA}"
            report_body="/tmp/${lang}-report.html"
            index_body="/tmp/${lang}-index.html"
            report_code=$(curl -L -sS -o "$report_body" -w '%{http_code}' -H 'Cache-Control: no-cache' "$report_url" || true)
            index_code=$(curl -L -sS -o "$index_body" -w '%{http_code}' -H 'Cache-Control: no-cache' "$index_url" || true)
            title=$(python - "$report_body" <<'PY'
          import re,sys
          p=sys.argv[1]
          try:
              text=open(p,encoding='utf-8',errors='replace').read()
          except OSError:
              text=''
          m=re.search(r'<title>(.*?)</title>',text,re.I|re.S)
          print((m.group(1).strip() if m else 'NO TITLE').replace('\n',' '))
          PY
          )
            if grep -q 'href="full-report.html"' "$index_body"; then link_status='present'; else link_status='missing'; fi
            size=$(wc -c < "$report_body" 2>/dev/null || echo 0)
            {
              echo
              echo "## ${lang}"
              echo "- report HTTP: ${report_code}"
              echo "- report bytes: ${size}"
              echo "- report title: ${title}"
              echo "- index HTTP: ${index_code}"
              echo "- index link to full-report.html: ${link_status}"
            } >> STATIC_REPORT_STATUS.md
          done
      - name: Record result
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add STATIC_REPORT_STATUS.md
          git commit -m 'Record final static full-report publication check' || exit 0
          git push origin HEAD:main
