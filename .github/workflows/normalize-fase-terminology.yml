name: Normalize Fase 4 terminology

on:
  push:
    paths:
      - '.github/workflows/normalize-fase-terminology.yml'

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize terminology in source timelines
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          files = {
              Path('TIMELINE.pl.md'): {
                  'note': '**Terminologia umowy:** NBBU Fase 4 jest odpowiednikiem ABU Fase C. W dalszej części używane jest wyłącznie określenie **Fase 4**.\n\n',
                  'patterns': ['Fase 4 / Fase C', 'faza C', 'fazy C', 'faza-C', 'fazy-C'],
              },
              Path('TIMELINE.en.md'): {
                  'note': '**Agreement terminology:** NBBU Fase 4 is equivalent to ABU Phase C. The remainder of this timeline uses only **Fase 4**.\n\n',
                  'patterns': ['Phase 4 / Phase C', 'Phase C', 'phase C', 'Phase 4'],
              },
              Path('TIMELINE.nl.md'): {
                  'note': '**Terminologie van de overeenkomst:** NBBU Fase 4 is de tegenhanger van ABU Fase C. In de rest van deze tijdlijn wordt alleen **Fase 4** gebruikt.\n\n',
                  'patterns': ['Fase 4 / Fase C', 'Fase C', 'fase C', 'fase-C'],
              },
          }

          for path, cfg in files.items():
              text = path.read_text(encoding='utf-8')
              for pattern in cfg['patterns']:
                  text = text.replace(pattern, 'Fase 4')

              note = cfg['note']
              if note.strip() not in text:
                  marker = '\n---\n'
                  pos = text.find(marker)
                  if pos == -1:
                      raise RuntimeError(f'Cannot locate introduction separator in {path}')
                  text = text[:pos] + '\n\n' + note.rstrip() + text[pos:]

              path.write_text(text, encoding='utf-8')

          forbidden = ['Fase 4 / Fase C', 'Phase 4 / Phase C', 'faza C', 'fazy C', 'fase C', 'fase-C']
          for path in files:
              text = path.read_text(encoding='utf-8')
              leftovers = [item for item in forbidden if item in text]
              if leftovers:
                  raise RuntimeError(f'Old terminology remains in {path}: {leftovers}')

          Path('.github/workflows/normalize-fase-terminology.yml').unlink()
          PY

      - name: Commit normalized source timelines
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Ujednolicenie terminologii NBBU Fase 4 w pełnych osiach czasu"
            git push
          fi
